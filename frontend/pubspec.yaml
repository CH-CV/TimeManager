name: timewise
description: "AI-powered time management application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^13.0.0

  # UI
  fl_chart: ^0.66.0

  # Utilities
  uuid: ^4.2.0
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # Firebase (optional, for future cloud sync)
  # firebase_core: ^2.24.0
  # firebase_auth: ^4.16.0
  # cloud_firestore: ^4.14.0
  # firebase_messaging: ^14.7.0

  # AI (optional, for future AI features)
  # dart_openai: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
